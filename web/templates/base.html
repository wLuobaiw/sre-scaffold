<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sre-scaffold — 部署工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <span class="logo">sre-scaffold</span>
        <nav class="steps" id="step-nav">
            {% block steps %}
            <span class="step active">1. 选择组件</span>
            <span class="step-divider">→</span>
            <span class="step">2. 配置主机</span>
            <span class="step-divider">→</span>
            <span class="step">3. 详细配置</span>
            <span class="step-divider">→</span>
            <span class="step">4. 确认部署</span>
            {% endblock %}
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        sre-scaffold · MIT
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
